name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish in dry-run mode
        required: true
        default: true
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Pack CLI
        run: npm run pack:cli

      - name: Smoke install from tarball
        run: npm run smoke:pack-install

      - name: Publish package
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace apps/cli --access public --dry-run
          else
            npm publish --workspace apps/cli --access public
          fi
